<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E343 Course Navigator</title>
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #f5f6fa;
            --card: #ffffff;
            --border: #e2e6ef;
            --text: #2d3142;
            --text-secondary: #626a84;
            --accent: #5b6abf;
            --accent-light: #eef0fb;
            --accent-dark: #3f4a99;
            --tag-lesson: #2e7d6f;
            --tag-standard: #c05621;
            --tag-topic: #6b46c1;
            --tag-vdw: #2563eb;
            --tag-im: #d63384;
            --tag-fp: #059669;
            --tag-cdm: #0891b2;
            --tag-assignment: #b45309;
            --tag-quiz: #7c3aed;
            --tag-process: #475569;
            --tag-resource: #64748b;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --radius: 8px;
        }

        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.55;
            height: 100%;
        }

        /* LAYOUT */
        .app { display: flex; flex-direction: column; min-height: 100vh; }

        .app-header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 1.25rem 2rem;
            display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap;
        }
        .app-header h1 {
            font-size: 1.35rem; font-weight: 700; color: var(--accent-dark);
            white-space: nowrap;
        }
        .app-header h1 span { font-weight: 400; color: var(--text-secondary); }

        /* SEARCH */
        .search-wrap {
            position: relative; flex: 1; min-width: 280px; max-width: 600px;
        }
        .search-wrap input {
            width: 100%; padding: 0.6rem 1rem 0.6rem 2.4rem;
            border: 1.5px solid var(--border); border-radius: var(--radius);
            font-size: 0.95rem; background: var(--bg); color: var(--text);
            transition: border-color 0.2s;
        }
        .search-wrap input:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(91,106,191,0.12);
        }
        .search-wrap::before {
            content: '⌕'; position: absolute; left: 0.8rem; top: 50%;
            transform: translateY(-50%); font-size: 1.1rem; color: var(--text-secondary);
            pointer-events: none;
        }
        .search-dropdown {
            position: absolute; top: 100%; left: 0; right: 0;
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); max-height: 420px; overflow-y: auto;
            box-shadow: var(--shadow-md); z-index: 100; display: none;
        }
        .search-dropdown.open { display: block; }
        .search-group-label {
            padding: 0.4rem 0.8rem; font-size: 0.7rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--text-secondary); background: var(--bg);
            position: sticky; top: 0;
        }
        .search-item {
            padding: 0.5rem 0.8rem; cursor: pointer; font-size: 0.88rem;
            display: flex; align-items: center; gap: 0.5rem;
            border-bottom: 1px solid #f0f1f5;
        }
        .search-item:hover, .search-item.active { background: var(--accent-light); }
        .search-item .type-dot {
            width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
        }

        /* HEADER LINKS */
        .header-links { display: flex; gap: 0.5rem; margin-left: auto; }
        .header-links button {
            padding: 0.45rem 0.9rem; border: 1.5px solid var(--border);
            border-radius: var(--radius); background: var(--card);
            font-size: 0.82rem; cursor: pointer; color: var(--text-secondary);
            transition: all 0.2s; font-weight: 500;
        }
        .header-links button:hover { border-color: var(--accent); color: var(--accent); }
        .header-links button.active-view {
            background: var(--accent); color: white; border-color: var(--accent);
        }

        /* MAIN CONTENT */
        .main-area { display: flex; flex: 1; overflow: hidden; }

        /* SIDEBAR */
        .sidebar {
            width: 260px; background: var(--card); border-right: 1px solid var(--border);
            overflow-y: auto; flex-shrink: 0; padding: 0.75rem 0;
        }
        .sidebar-section { margin-bottom: 0.25rem; }
        .sidebar-section-title {
            padding: 0.5rem 1rem; font-size: 0.72rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--text-secondary); cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            user-select: none;
        }
        .sidebar-section-title:hover { color: var(--accent); }
        .sidebar-section-title .chevron { transition: transform 0.2s; font-size: 0.65rem; }
        .sidebar-section-title .chevron.collapsed { transform: rotate(-90deg); }
        .sidebar-items { padding: 0 0.5rem; }
        .sidebar-items.collapsed { display: none; }
        .sidebar-item {
            padding: 0.35rem 0.6rem; font-size: 0.82rem; cursor: pointer;
            border-radius: 4px; color: var(--text-secondary);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            transition: background 0.15s;
        }
        .sidebar-item:hover { background: var(--accent-light); color: var(--text); }
        .sidebar-item.selected { background: var(--accent); color: white; }
        .sidebar-item .count {
            float: right; font-size: 0.7rem; opacity: 0.6;
            background: rgba(0,0,0,0.06); padding: 1px 5px; border-radius: 3px;
        }

        /* CENTER PANEL */
        .center { flex: 1; overflow-y: auto; padding: 1.5rem 2rem; }

        /* WELCOME VIEW */
        .welcome { max-width: 720px; margin: 0 auto; }
        .welcome h2 { font-size: 1.5rem; margin-bottom: 0.75rem; color: var(--accent-dark); }
        .welcome p { color: var(--text-secondary); margin-bottom: 1rem; font-size: 0.95rem; }
        .welcome .example-searches {
            display: flex; flex-wrap: wrap; gap: 0.4rem; margin: 0.75rem 0 1.5rem;
        }
        .example-searches .chip {
            padding: 0.3rem 0.7rem; border-radius: 20px; font-size: 0.8rem;
            background: var(--accent-light); color: var(--accent-dark);
            cursor: pointer; border: 1px solid transparent;
            transition: all 0.15s;
        }
        .example-searches .chip:hover {
            border-color: var(--accent); background: white;
        }
        .browse-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 0.75rem; margin-top: 1rem;
        }
        .browse-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 1rem; cursor: pointer;
            transition: all 0.2s;
        }
        .browse-card:hover { border-color: var(--accent); box-shadow: var(--shadow-sm); }
        .browse-card h4 { font-size: 0.9rem; margin-bottom: 0.25rem; }
        .browse-card p { font-size: 0.78rem; color: var(--text-secondary); }

        /* DETAIL VIEW */
        .detail-view { max-width: 900px; }
        .detail-header {
            display: flex; align-items: flex-start; gap: 1rem; margin-bottom: 1.25rem;
        }
        .detail-header h2 { font-size: 1.3rem; flex: 1; }
        .type-badge {
            display: inline-block; padding: 0.2rem 0.6rem; border-radius: 4px;
            font-size: 0.72rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.3px; color: white; flex-shrink: 0;
        }
        .detail-meta {
            display: flex; flex-wrap: wrap; gap: 0.5rem 1.25rem;
            font-size: 0.85rem; color: var(--text-secondary);
            margin-bottom: 1.25rem; padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .detail-meta strong { color: var(--text); font-weight: 600; }

        .connections-section { margin-bottom: 1.5rem; }
        .connections-section h3 {
            font-size: 0.95rem; font-weight: 600; margin-bottom: 0.5rem;
            color: var(--accent-dark); display: flex; align-items: center; gap: 0.5rem;
        }
        .connection-group { margin-bottom: 1rem; }
        .connection-group-label {
            font-size: 0.75rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: 0.4px; color: var(--text-secondary); margin-bottom: 0.3rem;
            padding-left: 0.25rem;
        }
        .connection-item {
            display: flex; align-items: center; gap: 0.5rem;
            padding: 0.4rem 0.5rem; border-radius: 4px; cursor: pointer;
            font-size: 0.85rem; transition: background 0.15s;
        }
        .connection-item:hover { background: var(--accent-light); }
        .connection-item .arrow { color: var(--text-secondary); font-size: 0.75rem; flex-shrink: 0; }
        .connection-item .conn-title { flex: 1; }
        .connection-item .conn-type-badge {
            font-size: 0.65rem; padding: 1px 5px; border-radius: 3px;
            background: var(--bg); color: var(--text-secondary); flex-shrink: 0;
        }

        /* Two-hop connections */
        .two-hop { opacity: 0.8; padding-left: 1.5rem; }
        .two-hop .connection-item { font-size: 0.82rem; }

        /* PRINT */
        .print-bar {
            display: flex; gap: 0.5rem; margin-bottom: 1rem;
        }
        .print-bar button {
            padding: 0.4rem 0.8rem; border: 1.5px solid var(--border);
            border-radius: var(--radius); background: var(--card);
            font-size: 0.8rem; cursor: pointer; color: var(--text-secondary);
            transition: all 0.2s;
        }
        .print-bar button:hover { border-color: var(--accent); color: var(--accent); }

        /* GRAPH VIEW */
        #graph-container {
            width: 100%; height: 100%; display: none; position: relative;
        }
        #graph-container svg { width: 100%; height: 100%; }

        /* LIST VIEW */
        .list-view { max-width: 900px; }
        .list-view h2 { font-size: 1.2rem; margin-bottom: 0.75rem; }
        .list-view-grid {
            display: grid; gap: 0.5rem;
        }
        .list-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 0.75rem 1rem;
            cursor: pointer; transition: all 0.15s;
            display: flex; align-items: center; gap: 0.75rem;
        }
        .list-card:hover { border-color: var(--accent); box-shadow: var(--shadow-sm); }
        .list-card .lc-title { flex: 1; font-size: 0.88rem; }
        .list-card .lc-connections {
            font-size: 0.75rem; color: var(--text-secondary);
            white-space: nowrap;
        }

        /* PRINT STYLES */
        @media print {
            .app-header, .sidebar, .print-bar, .header-links { display: none !important; }
            .main-area { display: block !important; }
            .center { padding: 0 !important; overflow: visible !important; }
            .connection-item { break-inside: avoid; }
            .detail-view { max-width: 100%; }
            body { background: white; }
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .app-header { padding: 0.75rem 1rem; }
            .center { padding: 1rem; }
            .app-header h1 { font-size: 1.1rem; }
        }

        /* Scroll shadows */
        .sidebar { scrollbar-width: thin; }
        .center { scrollbar-width: thin; }
    </style>
</head>
<body>
<div class="app">
    <header class="app-header">
        <h1>E343 <span>Course Navigator</span></h1>
        <div class="search-wrap">
            <input type="text" id="search" placeholder="Search by topic, week, standard, lesson name..." autocomplete="off">
            <div class="search-dropdown" id="search-dropdown"></div>
        </div>
        <div class="header-links">
            <button id="btn-browse" class="active-view" onclick="showView('browse')">Browse</button>
            <button id="btn-graph" onclick="showView('graph')">Graph</button>
        </div>
    </header>

    <div class="main-area">
        <nav class="sidebar" id="sidebar"></nav>
        <div class="center" id="center">
            <!-- content injected by JS -->
        </div>
        <div id="graph-container">
            <svg id="graph-svg"></svg>
        </div>
    </div>
</div>

<script>
// ============================================================================
// DATA — loaded inline for file:// compatibility
// ============================================================================
let GRAPH_DATA = null;
let ALL_NODES = [];
let EDGES = [];
let NODE_MAP = new Map();
let ADJ = new Map(); // nodeId -> [{edge, neighbor}]

const TYPE_COLORS = {
    lesson_plan: '#2e7d6f',
    indiana_standard: '#c05621',
    topic: '#6b46c1',
    vdw_section: '#2563eb',
    im_unit: '#d63384',
    im_lesson: '#e8457a',
    five_practice: '#059669',
    fp_chapter: '#059669',
    cdm_chapter: '#0891b2',
    cdm_video: '#0ea5e9',
    cdm_lesson: '#06b6d4',
    assignment: '#b45309',
    quiz: '#7c3aed',
    process_standard: '#475569',
    learning_component: '#e11d48',
    canvas_resource: '#64748b',
    canvas_folder: '#78909c',
    canvas_video: '#546e7a',
    im_field_placement: '#f472b6',
    default: '#94a3b8'
};

const TYPE_LABELS = {
    lesson_plan: 'Lesson Plan',
    indiana_standard: 'Indiana Standard',
    topic: 'Topic',
    vdw_section: 'Van de Walle',
    im_unit: 'IM Unit',
    im_lesson: 'IM Lesson',
    five_practice: 'Five Practice',
    fp_chapter: 'Five Practices Chapter',
    cdm_chapter: 'CDM Chapter',
    cdm_video: 'CDM Video',
    cdm_lesson: 'CDM Lesson',
    assignment: 'Assignment',
    quiz: 'Quiz',
    process_standard: 'Process Standard',
    learning_component: 'Learning Component',
    canvas_resource: 'Canvas Resource',
    canvas_folder: 'Canvas Folder',
    canvas_video: 'Canvas Video',
    im_field_placement: 'Field Placement'
};

const EDGE_LABELS = {
    aligns_to: 'Aligns to',
    equivalent_to: 'Equivalent to',
    covers_topic: 'Covers topic',
    references: 'References',
    teaches_toward: 'Teaches toward',
    progression_forward: 'Progresses to',
    progression_backward: 'Builds on',
    decomposes_into: 'Breaks down into',
    prerequisite_for: 'Prerequisite for',
    operationalizes: 'Operationalizes',
    structures: 'Structures',
    supports: 'Supports',
    demonstrates: 'Demonstrates',
    assigned_in: 'Assigned in',
    assesses: 'Assesses',
    provides_example: 'Provides example of',
    part_of: 'Part of'
};

// ============================================================================
// DATA LOADING
// ============================================================================
async function loadData() {
    try {
        const resp = await fetch('e343_alignment_graph.json');
        GRAPH_DATA = await resp.json();
    } catch (e) {
        // Fallback: try to find inline data
        console.error('Could not load JSON:', e);
        document.getElementById('center').innerHTML =
            '<div class="welcome"><h2>Data not found</h2><p>Make sure e343_alignment_graph.json is in the same folder as this file.</p></div>';
        return;
    }
    processData();
    buildSidebar();
    showWelcome();
}

function processData() {
    ALL_NODES = [];
    for (const [cat, nodeList] of Object.entries(GRAPH_DATA.nodes)) {
        for (const n of nodeList) {
            // Ensure title from whatever field is available
            if (!n.title) {
                n.title = n.name || n.label || n.code || (n.description ? n.description.slice(0, 70) + '...' : null) || humanizeId(n.id);
            }
            ALL_NODES.push(n);
            NODE_MAP.set(n.id, n);
        }
    }

    EDGES = GRAPH_DATA.edges.map(e => ({
        from: e.from,
        to: e.to,
        type: e.type
    }));

    // Build adjacency
    ADJ.clear();
    for (const n of ALL_NODES) ADJ.set(n.id, []);
    for (const e of EDGES) {
        const fromAdj = ADJ.get(e.from);
        const toAdj = ADJ.get(e.to);
        if (fromAdj) fromAdj.push({ edge: e, neighbor: e.to, direction: 'outgoing' });
        if (toAdj) toAdj.push({ edge: e, neighbor: e.from, direction: 'incoming' });
    }
}

function humanizeId(id) {
    return id.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function getTypeColor(type) {
    return TYPE_COLORS[type] || TYPE_COLORS.default;
}

function getTypeLabel(type) {
    return TYPE_LABELS[type] || humanizeId(type);
}

// ============================================================================
// SIDEBAR
// ============================================================================
function buildSidebar() {
    const sidebar = document.getElementById('sidebar');

    // Group lesson plans by unit
    const units = new Map();
    const noUnit = [];
    for (const n of ALL_NODES) {
        if (n.type === 'lesson_plan') {
            const u = n.unit !== undefined ? n.unit : extractUnit(n);
            if (u !== null) {
                if (!units.has(u)) units.set(u, []);
                units.get(u).push(n);
            } else {
                noUnit.push(n);
            }
        }
    }

    // Sort units
    const unitNames = {
        1: 'Unit 1: Pedagogy Foundations',
        2: 'Unit 2: Discourse & Five Practices',
        3: 'Unit 3: Operations & Algebraic Thinking',
        4: 'Unit 4: Fractions'
    };

    let html = '';

    // BY WEEK section
    html += '<div class="sidebar-section">';
    html += '<div class="sidebar-section-title" onclick="toggleSection(this)">By Week <span class="chevron">▾</span></div>';
    html += '<div class="sidebar-items">';
    for (const [u, items] of [...units.entries()].sort((a,b) => a[0] - b[0])) {
        if (u < 1) continue;
        const uName = unitNames[u] || `Unit ${u}`;
        html += `<div class="sidebar-item" style="font-weight:600;color:var(--accent-dark);cursor:default;margin-top:0.3rem;">${uName}</div>`;
        // Sort by week number extracted from title
        items.sort((a,b) => {
            const wa = extractWeek(a.title);
            const wb = extractWeek(b.title);
            return wa - wb;
        });
        for (const item of items) {
            const weekLabel = extractWeekLabel(item.title);
            html += `<div class="sidebar-item" onclick="selectNode('${item.id}')" title="${item.title}">${weekLabel}</div>`;
        }
    }
    if (noUnit.length) {
        html += '<div class="sidebar-item" style="font-weight:600;color:var(--text-secondary);margin-top:0.3rem;">Unassigned</div>';
        for (const item of noUnit) {
            html += `<div class="sidebar-item" onclick="selectNode('${item.id}')" title="${item.title}">${item.title}</div>`;
        }
    }
    html += '</div></div>';

    // BY FRAMEWORK section
    const frameworks = [
        { label: 'Indiana Standards', types: ['indiana_standard', 'process_standard'] },
        { label: 'Van de Walle', types: ['vdw_section'] },
        { label: 'Illustrative Math Units', types: ['im_unit'] },
        { label: 'Illustrative Math Lessons', types: ['im_lesson'] },
        { label: 'Five Practices', types: ['fp_chapter', 'five_practice'] },
        { label: 'CDM / Talk Moves', types: ['cdm_chapter', 'cdm_video', 'cdm_lesson'] },
    ];

    for (const fw of frameworks) {
        const items = ALL_NODES.filter(n => fw.types.includes(n.type));
        if (!items.length) continue;
        html += '<div class="sidebar-section">';
        html += `<div class="sidebar-section-title" onclick="toggleSection(this)">${fw.label} <span class="count" style="font-weight:400;font-size:0.65rem;">${items.length}</span> <span class="chevron collapsed">▾</span></div>`;
        html += '<div class="sidebar-items collapsed">';
        for (const item of items) {
            html += `<div class="sidebar-item" onclick="selectNode('${item.id}')" title="${item.title}">${item.title}</div>`;
        }
        html += '</div></div>';
    }

    // Assignments & Quizzes
    const assignments = ALL_NODES.filter(n => n.type === 'assignment');
    if (assignments.length) {
        html += '<div class="sidebar-section">';
        html += `<div class="sidebar-section-title" onclick="toggleSection(this)">Assignments <span class="count" style="font-weight:400;font-size:0.65rem;">${assignments.length}</span> <span class="chevron collapsed">▾</span></div>`;
        html += '<div class="sidebar-items collapsed">';
        for (const item of assignments) {
            html += `<div class="sidebar-item" onclick="selectNode('${item.id}')" title="${item.title}">${item.title}</div>`;
        }
        html += '</div></div>';
    }

    // Topics
    const topics = ALL_NODES.filter(n => n.type === 'topic');
    if (topics.length) {
        html += '<div class="sidebar-section">';
        html += `<div class="sidebar-section-title" onclick="toggleSection(this)">Topics <span class="count" style="font-weight:400;font-size:0.65rem;">${topics.length}</span> <span class="chevron collapsed">▾</span></div>`;
        html += '<div class="sidebar-items collapsed">';
        for (const item of topics.sort((a,b) => a.title.localeCompare(b.title))) {
            html += `<div class="sidebar-item" onclick="selectNode('${item.id}')" title="${item.title}">${item.title}</div>`;
        }
        html += '</div></div>';
    }

    sidebar.innerHTML = html;
}

function extractUnit(node) {
    const title = node.title || '';
    const weekNum = extractWeek(title);
    if (weekNum <= 4) return 1;
    if (weekNum <= 8) return 2;
    if (weekNum <= 12) return 3;
    if (weekNum <= 15) return 4;
    return null;
}

function extractWeek(title) {
    const m = title.match(/Week\s+(\d+)/i);
    return m ? parseInt(m[1]) : 99;
}

function extractWeekLabel(title) {
    const m = title.match(/(Week\s+\d+[^—]*)/i);
    if (m) {
        const rest = title.slice(title.indexOf('—') + 1).trim();
        return m[1].trim() + (rest ? ' — ' + rest : '');
    }
    return title;
}

function toggleSection(el) {
    const items = el.nextElementSibling;
    const chevron = el.querySelector('.chevron');
    items.classList.toggle('collapsed');
    chevron.classList.toggle('collapsed');
}

// ============================================================================
// SEARCH
// ============================================================================
const searchInput = document.getElementById('search');
const searchDropdown = document.getElementById('search-dropdown');
let searchResults = [];
let searchIndex = -1;

searchInput.addEventListener('input', function() {
    const q = this.value.trim().toLowerCase();
    if (q.length < 2) {
        searchDropdown.classList.remove('open');
        if (q.length === 0) {
            showWelcome();
        }
        return;
    }
    performSearch(q);
});

searchInput.addEventListener('keydown', function(e) {
    if (!searchDropdown.classList.contains('open')) return;
    if (e.key === 'ArrowDown') {
        e.preventDefault();
        searchIndex = Math.min(searchIndex + 1, searchResults.length - 1);
        updateSearchHighlight();
    } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        searchIndex = Math.max(searchIndex - 1, 0);
        updateSearchHighlight();
    } else if (e.key === 'Enter') {
        e.preventDefault();
        if (searchIndex >= 0 && searchResults[searchIndex]) {
            selectNode(searchResults[searchIndex].id);
            searchDropdown.classList.remove('open');
        }
    } else if (e.key === 'Escape') {
        searchDropdown.classList.remove('open');
    }
});

searchInput.addEventListener('focus', function() {
    if (this.value.trim().length >= 2) {
        performSearch(this.value.trim().toLowerCase());
    }
});

document.addEventListener('click', function(e) {
    if (!e.target.closest('.search-wrap')) {
        searchDropdown.classList.remove('open');
    }
});

function performSearch(q) {
    // Score and filter nodes
    const scored = [];
    for (const n of ALL_NODES) {
        let score = 0;
        const title = (n.title || '').toLowerCase();
        const id = n.id.toLowerCase();
        const desc = (n.description || '').toLowerCase();
        const topics = (n.topics || []).join(' ').toLowerCase();
        const code = (n.code || '').toLowerCase();
        const files = (n.sample_files || []).join(' ').toLowerCase();
        const schools = (n.schools || []).join(' ').toLowerCase();
        const semesters = (n.semesters || []).join(' ').toLowerCase();
        const name = (n.name || '').toLowerCase();

        if (title === q) score = 100;
        else if (title.startsWith(q)) score = 80;
        else if (title.includes(q)) score = 60;
        else if (name.includes(q)) score = 55;
        else if (code.includes(q)) score = 50;
        else if (id.includes(q)) score = 40;
        else if (files.includes(q)) score = 45;
        else if (topics.includes(q)) score = 35;
        else if (desc.includes(q)) score = 30;
        else if (schools.includes(q)) score = 25;
        else if (semesters.includes(q)) score = 20;
        else continue;

        scored.push({ ...n, _score: score });
    }

    scored.sort((a, b) => b._score - a._score || a.title.localeCompare(b.title));
    searchResults = scored.slice(0, 30);
    searchIndex = -1;

    // Group by type
    const grouped = new Map();
    for (const r of searchResults) {
        const label = getTypeLabel(r.type);
        if (!grouped.has(label)) grouped.set(label, []);
        grouped.get(label).push(r);
    }

    let html = '';
    if (searchResults.length === 0) {
        html = '<div class="search-item" style="color:var(--text-secondary);cursor:default;">No results found. Try a different term.</div>';
    } else {
        let idx = 0;
        for (const [groupLabel, items] of grouped) {
            html += `<div class="search-group-label">${groupLabel}</div>`;
            for (const item of items) {
                const color = getTypeColor(item.type);
                html += `<div class="search-item" data-idx="${idx}" onclick="selectNode('${item.id}');document.getElementById('search-dropdown').classList.remove('open');">
                    <span class="type-dot" style="background:${color}"></span>
                    <span>${highlightMatch(item.title, searchInput.value.trim())}</span>
                </div>`;
                idx++;
            }
        }
    }

    searchDropdown.innerHTML = html;
    searchDropdown.classList.add('open');
}

function highlightMatch(text, query) {
    if (!query) return text;
    const idx = text.toLowerCase().indexOf(query.toLowerCase());
    if (idx === -1) return text;
    return text.slice(0, idx) + '<strong>' + text.slice(idx, idx + query.length) + '</strong>' + text.slice(idx + query.length);
}

function updateSearchHighlight() {
    searchDropdown.querySelectorAll('.search-item').forEach((el, i) => {
        el.classList.toggle('active', i === searchIndex);
    });
    const active = searchDropdown.querySelector('.search-item.active');
    if (active) active.scrollIntoView({ block: 'nearest' });
}

function selectNode(nodeId) {
    const node = NODE_MAP.get(nodeId);
    if (!node) return;

    if (currentView === 'graph') {
        highlightGraphNode(nodeId);
        return;
    }

    // Update sidebar selection
    document.querySelectorAll('.sidebar-item.selected').forEach(el => el.classList.remove('selected'));

    const center = document.getElementById('center');
    const color = getTypeColor(node.type);
    const adj = ADJ.get(nodeId) || [];

    // Group connections by edge type
    const connByType = new Map();
    for (const { edge, neighbor, direction } of adj) {
        const label = EDGE_LABELS[edge.type] || humanizeId(edge.type);
        const dirLabel = direction === 'outgoing' ? label : reverseEdgeLabel(edge.type);
        if (!connByType.has(dirLabel)) connByType.set(dirLabel, []);
        const neighborNode = NODE_MAP.get(neighbor);
        if (neighborNode) {
            connByType.get(dirLabel).push(neighborNode);
        }
    }

    // Two-hop connections
    const directNeighborIds = new Set(adj.map(a => a.neighbor));
    directNeighborIds.add(nodeId);
    const twoHop = new Map();
    for (const { neighbor } of adj) {
        const neighborAdj = ADJ.get(neighbor) || [];
        for (const { edge: e2, neighbor: n2 } of neighborAdj) {
            if (directNeighborIds.has(n2)) continue;
            const n2Node = NODE_MAP.get(n2);
            if (!n2Node) continue;
            const key = n2Node.id;
            if (!twoHop.has(key)) {
                const via = NODE_MAP.get(neighbor);
                twoHop.set(key, { node: n2Node, via: via ? via.title : neighbor });
            }
        }
    }

    // Build meta info
    let metaHtml = '';
    if (node.grade_focus) metaHtml += `<span><strong>Grades:</strong> ${node.grade_focus.join(', ')}</span>`;

        part_of: 'Contains',
        progression_forward: 'Follows from',
        progression_backward: 'Leads to',

function copyConnections(nodeId) {
    const node = NODE_MAP.get(nodeId);
    if (!node) return;
    const adj = ADJ.get(nodeId) || [];

    let text = `${node.title} (${getTypeLabel(node.type)})\n`;
    text += '='.repeat(node.title.length) + '\n\n';

    if (node.description) text += node.description + '\n\n';

    const connByType = new Map();
    for (const { edge, neighbor, direction } of adj) {
        const label = direction === 'outgoing' ? (EDGE_LABELS[edge.type] || edge.type) : reverseEdgeLabel(edge.type);
        if (!connByType.has(label)) connByType.set(label, []);
        const nn = NODE_MAP.get(neighbor);
        if (nn) connByType.get(label).push(nn);
    }

    for (const [label, items] of connByType) {
        text += `${label}:\n`;
        for (const item of items) {
            text += `  • ${item.title} [${getTypeLabel(item.type)}]\n`;
        }
        text += '\n';
    }

    navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.print-bar button:last-child');
        const orig = btn.textContent;
        btn.textContent = 'Copied!';
        setTimeout(() => btn.textContent = orig, 1500);
    });
}

let graphInitialized = false;
let graphNodes = [];
let graphEdges = [];
let graphTransform = { x: 0, y: 0, scale: 1 };
let graphHover = null;
let graphFilter = new Set();
let graphDrawFn = null;
let graphRunning = false;

function initGraph() {
    if (graphInitialized) return;
    graphInitialized = true;

    // Populate filter set from all types actually present
    const presentTypes = new Set(ALL_NODES.map(n => n.type));
    graphFilter = new Set(presentTypes);

                ${[...presentTypes].sort().map(type => {
                    const label = TYPE_LABELS[type] || humanizeId(type);
                    const count = ALL_NODES.filter(n => n.type === type).length;
                    return `<label style="font-size:0.75rem;display:flex;align-items:center;gap:3px;cursor:pointer;padding:2px 4px;border-radius:3px;" onmouseenter="this.style.background='#f0f1f5'" onmouseleave="this.style.background='transparent'">
                        <input type="checkbox" checked data-graph-type="${type}" onchange="updateGraphFilter()">
                        <span style="width:8px;height:8px;border-radius:50%;background:${getTypeColor(type)};display:inline-block;flex-shrink:0;"></span>
                        ${label}&nbsp;(${count})
                    </label>`;
                }).join('')}
                <button onclick="zoomToFit()" style="margin-left:auto;padding:4px 10px;border:1px solid var(--border);border-radius:4px;background:var(--card);font-size:0.75rem;cursor:pointer;">Fit all</button>
            </div>
            <canvas id="graph-canvas" style="flex:1;cursor:grab;background:#fafbfd;"></canvas>
        </div>
    `;

    setupCanvasGraph();
}

function setupCanvasGraph() {
    const canvas = document.getElementById('graph-canvas');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
        W = canvas.clientWidth;
        H = canvas.clientHeight;
        canvas.width = W * devicePixelRatio;
        canvas.height = H * devicePixelRatio;
    }
    resize();
    window.addEventListener('resize', () => { resize(); draw(); });

    // --- Build graph data ---
    const typeList = [...new Set(ALL_NODES.map(n => n.type))];
    const typeCount = typeList.length;

    // Initial positions: arrange type clusters in a circle, nodes within each cluster in a smaller circle
    graphNodes = ALL_NODES.map((n, i) => {
        const typeIdx = typeList.indexOf(n.type);
        const group = ALL_NODES.filter(nd => nd.type === n.type);
        const withinIdx = group.indexOf(n);
        const groupSize = group.length;

        // Cluster center on a big circle
        const clusterAngle = (typeIdx / typeCount) * Math.PI * 2 - Math.PI / 2;
        const clusterRadius = Math.min(W, H) * 0.3;
        const clusterCx = W / 2 + Math.cos(clusterAngle) * clusterRadius;
        const clusterCy = H / 2 + Math.sin(clusterAngle) * clusterRadius;

        // Node position within cluster — small circle
        const innerAngle = (withinIdx / groupSize) * Math.PI * 2;
        const innerRadius = Math.min(30 + groupSize * 2, 120);
        const jx = (Math.random() - 0.5) * 20;
        const jy = (Math.random() - 0.5) * 20;

        return {
            id: n.id,
            x: clusterCx + Math.cos(innerAngle) * innerRadius + jx,
            y: clusterCy + Math.sin(innerAngle) * innerRadius + jy,
            vx: 0, vy: 0,
            type: n.type,
            title: n.title,
            connections: (ADJ.get(n.id) || []).length
        };
    });

    const nodeIdx = new Map();
    graphNodes.forEach((n, i) => nodeIdx.set(n.id, i));

    graphEdges = EDGES.map(e => ({
        from: nodeIdx.get(e.from),
        to: nodeIdx.get(e.to),
        type: e.type
    })).filter(e => e.from !== undefined && e.to !== undefined);

    // --- Force simulation with velocity (Verlet-ish) ---
    const TOTAL_ITERS = 300;
    let iter = 0;
    graphRunning = true;

    // Use Barnes-Hut-lite: grid-based repulsion for performance
    function simulate() {
        if (iter >= TOTAL_ITERS) {
            graphRunning = false;
            zoomToFit();
            draw();
            return;
        }
        iter++;
        const cooling = 1 - iter / TOTAL_ITERS; // 1 → 0
        const dt = 0.8 * cooling + 0.1;

        // Reset velocities
        for (const n of graphNodes) { n.vx = 0; n.vy = 0; }

        // Repulsion (sampling for performance with 369 nodes)
        const N = graphNodes.length;
        const repStr = 2000;
        const maxDist = 400;
        // Full O(n²) is ~68K pairs at 369 nodes — fast enough for canvas
        for (let i = 0; i < N; i++) {
            const a = graphNodes[i];
            for (let j = i + 1; j < N; j++) {
                const b = graphNodes[j];
                let dx = b.x - a.x;
                let dy = b.y - a.y;
                let d2 = dx * dx + dy * dy;
                if (d2 > maxDist * maxDist) continue;
                let dist = Math.sqrt(d2) || 0.1;
                let f = repStr / (dist * dist);
                let fx = (dx / dist) * f;
                let fy = (dy / dist) * f;
                a.vx -= fx; a.vy -= fy;
                b.vx += fx; b.vy += fy;
            }
        }

        // Edge attraction (spring)
        const springLen = 60;
        const springK = 0.06;
        for (const e of graphEdges) {
            const a = graphNodes[e.from], b = graphNodes[e.to];
            let dx = b.x - a.x, dy = b.y - a.y;
            let dist = Math.sqrt(dx * dx + dy * dy) || 0.1;
            let f = (dist - springLen) * springK;
            let fx = (dx / dist) * f;
            let fy = (dy / dist) * f;
            a.vx += fx; a.vy += fy;
            b.vx -= fx; b.vy -= fy;
        }

        // Center gravity
        const grav = 0.3;
        const centX = W / 2, centY = H / 2;
        for (const n of graphNodes) {
            n.vx += (centX - n.x) * grav * 0.01;
            n.vy += (centY - n.y) * grav * 0.01;
        }

        // Apply velocities with damping
        const maxV = 15;
        for (const n of graphNodes) {
            n.vx = Math.max(-maxV, Math.min(maxV, n.vx * dt));
            n.vy = Math.max(-maxV, Math.min(maxV, n.vy * dt));
            n.x += n.vx;
            n.y += n.vy;
        }

        draw();
        requestAnimationFrame(simulate);
    }

    // --- Rendering ---
    function draw() {
        const dpr = devicePixelRatio;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.clearRect(0, 0, W, H);

        // Subtle background grid
        ctx.save();
        ctx.translate(graphTransform.x, graphTransform.y);
        ctx.scale(graphTransform.scale, graphTransform.scale);

        // Edges
        ctx.lineWidth = 0.5 / graphTransform.scale;
        for (const e of graphEdges) {
            const a = graphNodes[e.from], b = graphNodes[e.to];
            if (!graphFilter.has(a.type) || !graphFilter.has(b.type)) continue;
            ctx.strokeStyle = 'rgba(120,130,150,0.12)';
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.stroke();
        }

        // Nodes
        const baseR = 3.5;
        for (const n of graphNodes) {
            if (!graphFilter.has(n.type)) continue;
            const r = baseR + Math.min(n.connections, 20) * 0.6;
            ctx.beginPath();
            ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
            ctx.fillStyle = getTypeColor(n.type);
            ctx.globalAlpha = 0.85;
            ctx.fill();
            ctx.globalAlpha = 1;
        }

        // Hover highlight
        if (graphHover && graphFilter.has(graphHover.type)) {
            const h = graphHover;
            const r = baseR + Math.min(h.connections, 20) * 0.6;

            // Highlight connected edges
            ctx.lineWidth = 1.5 / graphTransform.scale;
            ctx.strokeStyle = 'rgba(91,106,191,0.5)';
            for (const e of graphEdges) {
                if (e.from === nodeIdx.get(h.id) || e.to === nodeIdx.get(h.id)) {
                    const a = graphNodes[e.from], b = graphNodes[e.to];
                    if (!graphFilter.has(a.type) || !graphFilter.has(b.type)) continue;
                    ctx.beginPath();
                    ctx.moveTo(a.x, a.y);
                    ctx.lineTo(b.x, b.y);
                    ctx.stroke();
                }
            }

            // Highlight ring
            ctx.beginPath();
            ctx.arc(h.x, h.y, r + 3, 0, Math.PI * 2);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 2 / graphTransform.scale;
            ctx.stroke();

            // Label with background
            const fontSize = Math.max(10, 12 / graphTransform.scale);
            ctx.font = `600 ${fontSize}px -apple-system, sans-serif`;
            const textW = ctx.measureText(h.title).width;
            const pad = 4 / graphTransform.scale;
            const tx = h.x + r + 6;
            const ty = h.y;
            ctx.fillStyle = 'rgba(255,255,255,0.92)';
            ctx.fillRect(tx - pad, ty - fontSize / 2 - pad, textW + pad * 2, fontSize + pad * 2);
            ctx.fillStyle = '#2d3142';
            ctx.textBaseline = 'middle';
            ctx.fillText(h.title, tx, ty);
        }

        ctx.restore();
    }

    graphDrawFn = draw;

    // --- Zoom to fit ---
    window.zoomToFit = function() {
        const visible = graphNodes.filter(n => graphFilter.has(n.type));
        if (visible.length === 0) return;
        let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
        for (const n of visible) {
            minX = Math.min(minX, n.x); maxX = Math.max(maxX, n.x);
            minY = Math.min(minY, n.y); maxY = Math.max(maxY, n.y);
        }
        const pad = 60;
        const graphW = (maxX - minX) || 1;
        const graphH = (maxY - minY) || 1;
        const scale = Math.min((W - pad * 2) / graphW, (H - pad * 2) / graphH, 2);
        const cx = (minX + maxX) / 2;
        const cy = (minY + maxY) / 2;
        graphTransform.scale = scale;
        graphTransform.x = W / 2 - cx * scale;
        graphTransform.y = H / 2 - cy * scale;
        draw();
    };

    // --- Interaction ---
    let isDragging = false;
    let dragMoved = false;
    let lastMouse = { x: 0, y: 0 };

    canvas.addEventListener('mousedown', e => {
        isDragging = true;
        dragMoved = false;
        lastMouse = { x: e.offsetX, y: e.offsetY };
        canvas.style.cursor = 'grabbing';
    });

    canvas.addEventListener('mousemove', e => {
        if (isDragging) {
            const dx = e.offsetX - lastMouse.x;
            const dy = e.offsetY - lastMouse.y;
            if (Math.abs(dx) + Math.abs(dy) > 2) dragMoved = true;
            graphTransform.x += dx;
            graphTransform.y += dy;
            lastMouse = { x: e.offsetX, y: e.offsetY };
            if (!graphRunning) draw();
        } else {
            // Hover
            const mx = (e.offsetX - graphTransform.x) / graphTransform.scale;
            const my = (e.offsetY - graphTransform.y) / graphTransform.scale;
            let closest = null;
            let closestDist = 15 / graphTransform.scale;
            for (const n of graphNodes) {
                if (!graphFilter.has(n.type)) continue;
                const d = Math.sqrt((n.x - mx) ** 2 + (n.y - my) ** 2);
                if (d < closestDist) { closest = n; closestDist = d; }
            }
            if (closest !== graphHover) {
                graphHover = closest;
                canvas.style.cursor = closest ? 'pointer' : 'grab';
                if (!graphRunning) draw();
            }
        }
    });

    canvas.addEventListener('mouseup', () => {
        isDragging = false;
        canvas.style.cursor = graphHover ? 'pointer' : 'grab';
    });

    canvas.addEventListener('click', e => {
        if (graphHover && !dragMoved) {
            showView('browse');
            selectNode(graphHover.id);
        }
    });

    canvas.addEventListener('wheel', e => {
        e.preventDefault();
        const oldScale = graphTransform.scale;
        const factor = e.deltaY > 0 ? 0.88 : 1.12;
        const newScale = Math.max(0.05, Math.min(8, oldScale * factor));
        // Zoom toward mouse position
        const mx = e.offsetX, my = e.offsetY;
        graphTransform.x = mx - (mx - graphTransform.x) * (newScale / oldScale);
        graphTransform.y = my - (my - graphTransform.y) * (newScale / oldScale);
        graphTransform.scale = newScale;
        if (!graphRunning) draw();
    }, { passive: false });

    simulate();
}

function updateGraphFilter() {
    graphFilter.clear();
    document.querySelectorAll('[data-graph-type]').forEach(cb => {
        if (cb.checked) graphFilter.add(cb.dataset.graphType);
    });
    if (graphDrawFn) graphDrawFn();
}

function highlightGraphNode(nodeId) {
    showView('browse');
    selectNode(nodeId);
}

// ============================================================================
// INIT
// ============================================================================
loadData();
</script>
</body>
</html>
